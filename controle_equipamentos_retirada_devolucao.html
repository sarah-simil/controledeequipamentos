
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{padding:1rem 0;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;}
.top-bar h2{font-size:18px;font-weight:500;color:var(--color-text-primary);}
.top-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--color-text-primary);}
.btn:hover{background:var(--color-background-secondary);}
.btn-export{border-color:#0F6E56;color:#0F6E56;font-weight:500;}
.btn-export:hover{background:#E1F5EE;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem;}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;}
.metric .lbl{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;}
.metric .val{font-size:22px;font-weight:500;}
.metric .val.ok{color:#0F6E56;}
.metric .val.warn{color:#854F0B;}
.metric .val.err{color:#A32D2D;}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.filters select,.filters input{border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;padding:6px 10px;}
.filters input{flex:1;min-width:160px;}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
thead th{text-align:left;padding:8px 10px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.03em;}
tbody tr{border-bottom:0.5px solid var(--color-border-tertiary);}
tbody tr:hover{background:var(--color-background-secondary);}
tbody td{padding:9px 10px;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{display:inline-block;border-radius:var(--border-radius-md);padding:2px 9px;font-size:11px;font-weight:500;}
.b-ok{background:#E1F5EE;color:#085041;}
.b-warn{background:#FAEEDA;color:#633806;}
.b-err{background:#FCEBEB;color:#791F1F;}
.b-off{background:#F1EFE8;color:#5F5E5A;}
.row-actions{display:flex;gap:4px;}
.ic-btn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:15px;padding:3px;border-radius:4px;}
.ic-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary);}
.ic-btn.ret{color:#0F6E56;}
.ic-btn.dev{color:#854F0B;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.38);z-index:100;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.open{display:flex;}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);padding:1.5rem;width:min(480px,100%);max-height:90vh;overflow-y:auto;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.modal-hdr h3{font-size:16px;font-weight:500;color:var(--color-text-primary);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;padding:7px 10px;font-family:inherit;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;}
.btn-cancel{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 16px;font-size:13px;cursor:pointer;color:var(--color-text-primary);}
.btn-save{background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);padding:7px 16px;font-size:13px;cursor:pointer;font-weight:500;}
.btn-cancel:hover{background:var(--color-background-secondary);}
.empty{text-align:center;color:var(--color-text-secondary);padding:2.5rem;font-size:13px;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0F6E56;color:#E1F5EE;border-radius:var(--border-radius-md);padding:10px 18px;font-size:13px;font-weight:500;z-index:200;opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.info-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);padding:10px 14px;font-size:12px;color:var(--color-text-secondary);margin-bottom:12px;}
.info-box strong{color:var(--color-text-primary);}
th:nth-child(1){width:22%;}th:nth-child(2){width:11%;}th:nth-child(3){width:11%;}th:nth-child(4){width:11%;}th:nth-child(5){width:13%;}th:nth-child(6){width:11%;}th:nth-child(7){width:11%;}th:nth-child(8){width:10%;}
</style>

<div class="wrap">
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">Controle de equipamentos de obra</h2>
<div class="top-bar">
  <h2><i class="ti ti-bulldozer" aria-hidden="true" style="font-size:18px;vertical-align:-2px;margin-right:6px;"></i>Equipamentos de obra</h2>
  <div class="top-actions">
    <button class="btn btn-export" onclick="exportXLSX()"><i class="ti ti-file-spreadsheet" aria-hidden="true"></i> Exportar</button>
    <button class="btn" onclick="openModal()"><i class="ti ti-plus" aria-hidden="true"></i> Novo</button>
  </div>
</div>

<div class="metrics" id="metrics"></div>

<div class="filters">
  <input type="text" id="search" placeholder="Buscar equipamento ou responsável..." oninput="render()">
  <select id="fStatus" onchange="render()">
    <option value="">Todos os status</option>
    <option value="Disponível">Disponível</option>
    <option value="Em uso">Em uso</option>
    <option value="Manutenção">Manutenção</option>
    <option value="Inativo">Inativo</option>
  </select>
  <select id="fType" onchange="render()">
    <option value="">Todos os tipos</option>
    <option value="Escavação">Escavação</option>
    <option value="Transporte">Transporte</option>
    <option value="Içamento">Içamento</option>
    <option value="Compactação">Compactação</option>
    <option value="Elétrico">Elétrico</option>
    <option value="Outros">Outros</option>
  </select>
</div>

<div style="overflow-x:auto;">
<table>
<thead><tr>
  <th>Equipamento</th><th>Tipo</th><th>Status</th><th>Patrimônio</th><th>Responsável</th><th>Retirada</th><th>Devolução</th><th>Ações</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<!-- Modal cadastro/edição -->
<div class="modal-bg" id="modalBg">
<div class="modal">
  <div class="modal-hdr">
    <h3 id="modalTitle">Novo equipamento</h3>
    <button class="ic-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
  </div>
  <div class="field"><label>Nome do equipamento</label><input id="fNome" placeholder="Ex: Escavadeira hidráulica"></div>
  <div class="row2">
    <div class="field"><label>Tipo</label>
      <select id="fTipo"><option>Escavação</option><option>Transporte</option><option>Içamento</option><option>Compactação</option><option>Elétrico</option><option>Outros</option></select>
    </div>
    <div class="field"><label>Status</label>
      <select id="fStat"><option>Disponível</option><option>Em uso</option><option>Manutenção</option><option>Inativo</option></select>
    </div>
  </div>
  <div class="row2">
    <div class="field"><label>Nº patrimônio</label><input id="fPatrimonio" placeholder="Ex: EQ-0042"></div>
    <div class="field"><label>Responsável</label><input id="fResponsavel" placeholder="Nome do responsável"></div>
  </div>
  <div class="row2">
    <div class="field"><label>Localização na obra</label><input id="fLocal" placeholder="Ex: Bloco A, Térreo"></div>
    <div class="field"><label>Próxima manutenção</label><input id="fManut" type="date"></div>
  </div>
  <div class="field"><label>Observações</label><textarea id="fObs" rows="2" placeholder="Informações adicionais..."></textarea></div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    <button class="btn-save" onclick="save()">Salvar</button>
  </div>
</div>
</div>

<!-- Modal retirada -->
<div class="modal-bg" id="modalRet">
<div class="modal">
  <div class="modal-hdr">
    <h3><i class="ti ti-arrow-up-right" style="color:#0F6E56;margin-right:6px;"></i>Registrar retirada</h3>
    <button class="ic-btn" onclick="closeRet()"><i class="ti ti-x"></i></button>
  </div>
  <div class="info-box" id="retInfo"></div>
  <div class="row2">
    <div class="field"><label>Data de retirada</label><input id="rData" type="date"></div>
    <div class="field"><label>Responsável pela retirada</label><input id="rResponsavel" placeholder="Nome do responsável"></div>
  </div>
  <div class="field"><label>Destino / Localização na obra</label><input id="rLocal" placeholder="Ex: Bloco B, 3º andar"></div>
  <div class="field"><label>Previsão de devolução</label><input id="rPrevisao" type="date"></div>
  <div class="field"><label>Observações</label><textarea id="rObs" rows="2" placeholder="Observações sobre a retirada..."></textarea></div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="closeRet()">Cancelar</button>
    <button class="btn-save" onclick="saveRet()">Confirmar retirada</button>
  </div>
</div>
</div>

<!-- Modal devolução -->
<div class="modal-bg" id="modalDev">
<div class="modal">
  <div class="modal-hdr">
    <h3><i class="ti ti-arrow-down-left" style="color:#854F0B;margin-right:6px;"></i>Registrar devolução</h3>
    <button class="ic-btn" onclick="closeDev()"><i class="ti ti-x"></i></button>
  </div>
  <div class="info-box" id="devInfo"></div>
  <div class="row2">
    <div class="field"><label>Data de devolução</label><input id="dData" type="date"></div>
    <div class="field"><label>Condição ao devolver</label>
      <select id="dCondicao"><option>Bom estado</option><option>Com defeito</option><option>Necessita manutenção</option></select>
    </div>
  </div>
  <div class="field"><label>Observações</label><textarea id="dObs" rows="2" placeholder="Observações sobre a devolução..."></textarea></div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="closeDev()">Cancelar</button>
    <button class="btn-save" onclick="saveDev()">Confirmar devolução</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let data = [
  {id:1,nome:"Escavadeira hidráulica 20t",tipo:"Escavação",status:"Em uso",patrimonio:"EQ-0001",responsavel:"Carlos Menezes",local:"Fundação - Bloco A",manut:"2025-08-15",obs:"",retirada:"2025-06-10",previsao:"2025-07-10",devolucao:""},
  {id:2,nome:"Caminhão basculante 10m³",tipo:"Transporte",status:"Em uso",patrimonio:"EQ-0002",responsavel:"Rogério Lima",local:"Acesso principal",manut:"2025-07-30",obs:"",retirada:"2025-06-12",previsao:"2025-07-12",devolucao:""},
  {id:3,nome:"Guindaste de torre 40m",tipo:"Içamento",status:"Disponível",patrimonio:"EQ-0003",responsavel:"",local:"",manut:"2025-09-10",obs:"",retirada:"",previsao:"",devolucao:""},
  {id:4,nome:"Rolo compactador vibratório",tipo:"Compactação",status:"Manutenção",patrimonio:"EQ-0004",responsavel:"Oficina central",local:"",manut:"2025-07-05",obs:"Troca de rolamento",retirada:"",previsao:"",devolucao:""},
  {id:5,nome:"Gerador 150 kVA",tipo:"Elétrico",status:"Disponível",patrimonio:"EQ-0005",responsavel:"",local:"",manut:"2025-08-01",obs:"",retirada:"",previsao:"",devolucao:""},
  {id:6,nome:"Retroescavadeira",tipo:"Escavação",status:"Disponível",patrimonio:"EQ-0006",responsavel:"",local:"",manut:"2025-09-20",obs:"",retirada:"",previsao:"",devolucao:""},
  {id:7,nome:"Betoneira 600L",tipo:"Outros",status:"Inativo",patrimonio:"EQ-0007",responsavel:"",local:"Depósito",manut:"",obs:"Aguardando reforma",retirada:"",previsao:"",devolucao:""},
];
let editId=null, retId=null, devId=null;

const fmt = s => { if(!s)return"—"; const[y,m,d]=s.split("-"); return`${d}/${m}/${y}`; };
const today = () => new Date().toISOString().split("T")[0];

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}

const statusBadge = s => {
  if(s==="Disponível") return`<span class="badge b-ok">${s}</span>`;
  if(s==="Em uso")     return`<span class="badge b-warn">${s}</span>`;
  if(s==="Manutenção") return`<span class="badge b-err">${s}</span>`;
  return`<span class="badge b-off">${s}</span>`;
};

function getFiltered(){
  const q=document.getElementById("search").value.toLowerCase();
  const fs=document.getElementById("fStatus").value;
  const ft=document.getElementById("fType").value;
  return data.filter(d=>{
    const m=(d.nome+d.responsavel+d.patrimonio+d.local).toLowerCase().includes(q);
    return m&&(!fs||d.status===fs)&&(!ft||d.tipo===ft);
  });
}

function metrics(){
  const tot=data.length;
  const disp=data.filter(d=>d.status==="Disponível").length;
  const uso=data.filter(d=>d.status==="Em uso").length;
  const mnt=data.filter(d=>d.status==="Manutenção").length;
  document.getElementById("metrics").innerHTML=`
    <div class="metric"><div class="lbl">Total</div><div class="val">${tot}</div></div>
    <div class="metric"><div class="lbl">Disponíveis</div><div class="val ok">${disp}</div></div>
    <div class="metric"><div class="lbl">Em uso</div><div class="val warn">${uso}</div></div>
    <div class="metric"><div class="lbl">Manutenção</div><div class="val err">${mnt}</div></div>
  `;
}

function render(){
  const filtered=getFiltered();
  const tbody=document.getElementById("tbody");
  metrics();
  if(!filtered.length){tbody.innerHTML=`<tr><td colspan="8" class="empty">Nenhum equipamento encontrado</td></tr>`;return;}
  tbody.innerHTML=filtered.map(d=>{
    const podeRetirar = d.status==="Disponível";
    const podeDevolver = d.status==="Em uso";
    return`<tr>
      <td title="${d.nome}">${d.nome}</td>
      <td>${d.tipo}</td>
      <td>${statusBadge(d.status)}</td>
      <td>${d.patrimonio||"—"}</td>
      <td title="${d.responsavel}">${d.responsavel||"—"}</td>
      <td>${fmt(d.retirada)}</td>
      <td>${fmt(d.devolucao)}</td>
      <td><div class="row-actions">
        ${podeRetirar?`<button class="ic-btn ret" title="Registrar retirada" onclick="openRet(${d.id})"><i class="ti ti-arrow-up-right"></i></button>`:""}
        ${podeDevolver?`<button class="ic-btn dev" title="Registrar devolução" onclick="openDev(${d.id})"><i class="ti ti-arrow-down-left"></i></button>`:""}
        <button class="ic-btn" title="Editar" onclick="edit(${d.id})"><i class="ti ti-edit"></i></button>
        <button class="ic-btn" title="Remover" onclick="remove(${d.id})"><i class="ti ti-trash"></i></button>
      </div></td>
    </tr>`;
  }).join("");
}

// Modal cadastro
function openModal(prefill){
  editId=prefill?prefill.id:null;
  document.getElementById("modalTitle").textContent=editId?"Editar equipamento":"Novo equipamento";
  document.getElementById("fNome").value=prefill?.nome||"";
  document.getElementById("fTipo").value=prefill?.tipo||"Escavação";
  document.getElementById("fStat").value=prefill?.status||"Disponível";
  document.getElementById("fPatrimonio").value=prefill?.patrimonio||"";
  document.getElementById("fResponsavel").value=prefill?.responsavel||"";
  document.getElementById("fLocal").value=prefill?.local||"";
  document.getElementById("fManut").value=prefill?.manut||"";
  document.getElementById("fObs").value=prefill?.obs||"";
  document.getElementById("modalBg").classList.add("open");
}
function closeModal(){document.getElementById("modalBg").classList.remove("open");}
function save(){
  const nome=document.getElementById("fNome").value.trim();
  if(!nome){alert("Informe o nome do equipamento.");return;}
  const obj={
    id:editId||Date.now(),
    nome,tipo:document.getElementById("fTipo").value,
    status:document.getElementById("fStat").value,
    patrimonio:document.getElementById("fPatrimonio").value.trim(),
    responsavel:document.getElementById("fResponsavel").value.trim(),
    local:document.getElementById("fLocal").value.trim(),
    manut:document.getElementById("fManut").value,
    obs:document.getElementById("fObs").value.trim(),
    retirada:editId?(data.find(d=>d.id===editId)?.retirada||""):"",
    devolucao:editId?(data.find(d=>d.id===editId)?.devolucao||""):"",
    previsao:editId?(data.find(d=>d.id===editId)?.previsao||""):"",
  };
  if(editId) data=data.map(d=>d.id===editId?obj:d);
  else data.push(obj);
  closeModal(); render();
  showToast(editId?"✓ Equipamento atualizado":"✓ Equipamento cadastrado");
}
function edit(id){openModal(data.find(d=>d.id===id));}
function remove(id){if(confirm("Remover este equipamento?")){data=data.filter(d=>d.id!==id);render();showToast("Equipamento removido");}}

// Modal retirada
function openRet(id){
  retId=id;
  const d=data.find(x=>x.id===id);
  document.getElementById("retInfo").innerHTML=`<strong>${d.nome}</strong> — ${d.patrimonio||"sem patrimônio"}`;
  document.getElementById("rData").value=today();
  document.getElementById("rResponsavel").value="";
  document.getElementById("rLocal").value="";
  document.getElementById("rPrevisao").value="";
  document.getElementById("rObs").value="";
  document.getElementById("modalRet").classList.add("open");
}
function closeRet(){document.getElementById("modalRet").classList.remove("open");}
function saveRet(){
  const resp=document.getElementById("rResponsavel").value.trim();
  const dt=document.getElementById("rData").value;
  if(!dt||!resp){alert("Informe a data e o responsável pela retirada.");return;}
  data=data.map(d=>{
    if(d.id!==retId)return d;
    return{...d,status:"Em uso",retirada:dt,responsavel:resp,local:document.getElementById("rLocal").value.trim(),previsao:document.getElementById("rPrevisao").value,devolucao:"",obs:document.getElementById("rObs").value.trim()||d.obs};
  });
  closeRet(); render();
  showToast("✓ Retirada registrada — equipamento em uso");
}

// Modal devolução
function openDev(id){
  devId=id;
  const d=data.find(x=>x.id===id);
  document.getElementById("devInfo").innerHTML=`<strong>${d.nome}</strong> — retirado em ${fmt(d.retirada)} por <strong>${d.responsavel||"—"}</strong>`;
  document.getElementById("dData").value=today();
  document.getElementById("dCondicao").value="Bom estado";
  document.getElementById("dObs").value="";
  document.getElementById("modalDev").classList.add("open");
}
function closeDev(){document.getElementById("modalDev").classList.remove("open");}
function saveDev(){
  const dt=document.getElementById("dData").value;
  const cond=document.getElementById("dCondicao").value;
  if(!dt){alert("Informe a data de devolução.");return;}
  const novoStatus = cond==="Bom estado"?"Disponível":"Manutenção";
  data=data.map(d=>{
    if(d.id!==devId)return d;
    return{...d,status:novoStatus,devolucao:dt,responsavel:"",local:"",previsao:"",obs:document.getElementById("dObs").value.trim()||d.obs};
  });
  closeDev(); render();
  showToast(novoStatus==="Disponível"?"✓ Devolvido — equipamento disponível no estoque":"✓ Devolvido — enviado para manutenção");
}

function exportXLSX(){
  const rows=getFiltered();
  const hoje=new Date().toLocaleDateString("pt-BR");
  const wsData=[
    ["CONTROLE DE EQUIPAMENTOS DE OBRA"],
    [`Gerado em: ${hoje}`],[],
    ["Equipamento","Tipo","Status","Patrimônio","Responsável","Data Retirada","Previsão Devolução","Data Devolução","Localização","Observações"],
    ...rows.map(d=>[d.nome,d.tipo,d.status,d.patrimonio||"—",d.responsavel||"—",fmt(d.retirada),fmt(d.previsao),fmt(d.devolucao),d.local||"—",d.obs||""]),
    [],[`Resumo`],
    ["Total",rows.length],
    ["Disponíveis",rows.filter(d=>d.status==="Disponível").length],
    ["Em uso",rows.filter(d=>d.status==="Em uso").length],
    ["Manutenção",rows.filter(d=>d.status==="Manutenção").length],
    ["Inativos",rows.filter(d=>d.status==="Inativo").length],
  ];
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws["!cols"]=[{wch:30},{wch:13},{wch:13},{wch:13},{wch:20},{wch:15},{wch:18},{wch:15},{wch:22},{wch:28}];
  ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:9}}];
  XLSX.utils.book_append_sheet(wb,ws,"Equipamentos");
  XLSX.writeFile(wb,`equipamentos_obra_${hoje.replace(/\//g,"-")}.xlsx`);
  showToast("✓ Planilha exportada!");
}

document.querySelectorAll(".modal-bg").forEach(bg=>{
  bg.addEventListener("click",e=>{if(e.target===bg){bg.classList.remove("open");}});
});
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.querySelectorAll(".modal-bg").forEach(b=>b.classList.remove("open"));});
render();
</script>
